<html>
<body>

<div class="shell">

<header>

<div>
<div class="brand">RAINBOW SIX CUBA</div>
<h1>COMPETITIVE CENTER</h1>
<p>Ranked Intelligence • Player Performance • Live Data</p>
</div>

<div class="season">
LIVE SYSTEM
</div>

</header>


<section class="grid">


<aside>

<div class="box highlight">
<div class="small">GLOBAL</div>
<div class="big">RANKING</div>
</div>


<div class="box">
<div class="number">{{COUNT}}</div>
<span>PLAYERS TRACKED</span>
</div>


<div class="box">
<div class="number">R6</div>
<span>COMPETITIVE DATA</span>
</div>


</aside>



<main>

{{ROWS}}

</main>


</section>


<footer>
Rainbow Six CUBA Stats Engine • Competitive Ecosystem
</footer>


</div>



<style>

*{
box-sizing:border-box;
}


body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:white;
}



.shell{
width:1200px;
height:675px;
padding:42px;
overflow:hidden;

background:
linear-gradient(
135deg,
#050505 0%,
#090b10 45%,
#220008 100%
);

position:relative;
}



.shell:before{
content:"";
position:absolute;
inset:0;
background:
repeating-linear-gradient(
120deg,
transparent,
transparent 40px,
rgba(255,255,255,.025) 42px
);
}



header,
.grid,
footer{
position:relative;
z-index:2;
}



header{
display:flex;
justify-content:space-between;
}



.brand{
font-size:13px;
letter-spacing:6px;
color:#ff1744;
font-weight:bold;
}



h1{
font-size:50px;
margin:15px 0 5px;
}



p{
color:#94a3b8;
}



.season{
height:max-content;
padding:14px 28px;
background:#ff1744;
border-radius:40px;
font-weight:bold;
}



.grid{
display:grid;
grid-template-columns:270px 1fr;
gap:28px;
margin-top:40px;
}



.box{
background:#090d18dd;
border:1px solid #262b38;
border-radius:18px;
padding:22px;
margin-bottom:18px;
}



.highlight{
border-color:#ff1744;
}



.small{
color:#888;
}



.big{
font-size:30px;
font-weight:bold;
}



.number{
font-size:38px;
font-weight:bold;
}



.box span{
color:#94a3b8;
}



.player{
background:
linear-gradient(
90deg,
#090d18,
#050505
);

border-left:5px solid #ff1744;
border-radius:18px;

padding:20px 25px;

margin-bottom:16px;

display:flex;
justify-content:space-between;
align-items:center;
}



.name{
font-size:27px;
font-weight:bold;
text-transform:uppercase;
}



.rank{
color:#00ff88;
font-size:20px;
font-weight:bold;
}



.stats{
display:flex;
gap:35px;
font-size:22px;
text-align:center;
}



.stats div{
color:white;
}



footer{
margin-top:25px;
color:#64748b;
}


</style>


</body>
</html>
